services:
  mysql:
    image: mysql:8.4
    container_name: gak-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: GAK
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./gak-backend
      dockerfile: Dockerfile
    container_name: gak-backend
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - ./gak-backend/.env.production.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: GAK
      HOST: 0.0.0.0
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: gak-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
